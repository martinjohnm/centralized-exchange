
services:
  # 1. The Matching Engine
  engine:
    build:
      context: .
      args:
        - PKG_NAME=engine
        - BIN_NAME=engine  # This tells the Dockerfile WHICH binary to build
    container_name: ex_engine
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy # This is the magic line

  # 2. The Strategy/Order Placer
  order-firer:
    build:
      context: .
      args:
        - PKG_NAME=engine
        - BIN_NAME=fire_orders # Builds the fire_orders binary specifically
    container_name: ex_firer
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy # This is the magic line
      engine:
        condition: service_started  # Waits for the Engine container to start

  # 3. The WebSocket Gateway
  websocket-server:
    build:
      context: .
      args:
        - PKG_NAME=websocket-server
        - BIN_NAME=websocket-server
    container_name: ex_ws
    ports:
      - "8080:8080"
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy # This is the magic line
  api-server:
    build:
      context: .
      args:
        - PKG_NAME=api-server
        - BIN_NAME=api-server
    container_name: ex_api
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://admin:password@timescaledb:5432/exchange
    depends_on:
      timescaledb:
        condition: service_healthy
      
  # 4. Redis
  redis:
    image: redis:7-alpine
    container_name: ex_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 3s
      retries: 30

  timescaledb:
    image: timescale/timescaledb:latest-pg12
    container_name: ex_timescale
    environment:
      - POSTGRES_DB=exchange
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d exchange"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - timescale-data:/var/lib/postgresql/data

  db-worker:
    build:
      context: .
      args:
        - PKG_NAME=db
        - BIN_NAME=db 
    
    environment:
      - DATABASE_URL=postgres://admin:password@timescaledb:5432/exchange
      - REDIS_URL=redis://redis:6379
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy

  # 5. The TypeScript Frontend
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: ex_frontend
    ports:
      - "5173:80"  # Access your UI at http://localhost:3000
    depends_on:
      - websocket-server
      - api-server
    environment:
      - VITE_WS_URL=ws://localhost:8080/ws # Inject the WS URL for the client browser

volumes:
  timescale-data: