syntax = "proto3";
package exchange;

enum Side {
    BUY = 0;
    SELL = 1;
}

enum OrderType {
    LIMIT = 0;
    MARKET = 1;
}

// Separate the Envelope from the Payload
message ExchangeRequest {
    uint64 user_id = 1;
    uint64 timestamp = 2; // Critical for measuring latency (T1)

    oneof action {
        CreateOrder create = 3;
        CancelOrder cancel = 4;
        CancelAll   cancel_all = 5;
        Deposit     deposit = 6;
    }
}

message CreateOrder {
    string symbol = 1;
    string price = 2;
    string quantity = 3;
    Side side = 4;
    OrderType order_type = 5;
    uint64 client_id = 6; // For your MM mapping
}

message CancelOrder {
    string symbol = 1;
    // The engine tries client_id first, then engine_id
    uint64 client_id = 2; 
    uint64 engine_id = 3; 
}

message CancelAll {
    string symbol = 1;
}

message Deposit {
    string asset = 1; // "USDT"
    string amount = 2;
    uint64 tx_id = 3;  // For idempotency
}

// ====== OUT TYPES ==========================================
message Trade {
    uint64 maker_id = 1;
    uint64 taker_id = 2;
    string price = 3;     // "100.50"
    string quantity = 4;  // "0.001"
    string taker_side = 5; // "buy" or "sell"
    string maker_side = 6;
    uint64 timestamp = 7;
}