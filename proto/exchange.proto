syntax = "proto3";
package exchange;

enum Side {
    BUY = 0;
    SELL = 1;
}

enum OrderType {
    LIMIT = 0;
    MARKET = 1;
}

// Separate the Envelope from the Payload
message ExchangeRequest {
    uint64 user_id = 1;
    uint64 timestamp = 2; // Critical for measuring latency (T1)

    oneof action {
        CreateOrder create = 3;
        CancelOrder cancel = 4;
        CancelAll   cancel_all = 5;
        Deposit     deposit = 6;
    }
}

message CreateOrder {
    MarketId market = 1;
    string price = 2;
    string quantity = 3;
    Side side = 4;
    OrderType order_type = 5;
    uint64 client_id = 6; // For your MM mapping
}

message CancelOrder {
    MarketId market = 1;
    // The engine tries client_id first, then engine_id
    uint64 client_id = 2; 
    uint64 engine_id = 3; 
}

message CancelAll {
    MarketId market = 1;
}

message Deposit {
    AssetId asset = 1; // "USDT"
    string amount = 2;
    uint64 tx_id = 3;  // For idempotency
}

// ====== OUT TYPES ==========================================
message Trade {
    uint64 maker_id = 1;
    uint64 taker_id = 2;
    string price = 3;     // "100.50"
    string quantity = 4;  // "0.001"
    Side taker_side = 5; // "buy" or "sell"
    Side maker_side = 6;
    uint64 timestamp = 7;
    MarketId market = 8;
    AssetId base = 9;
    AssetId quote = 10;
}

message Level {
    string price = 1;    // String to preserve Decimal precision in JS
    string quantity = 2; // Total volume at this price
}

message DepthUpdate {
    MarketId market = 1;        // Using MarketId enum
    repeated Level bids = 2; // Buy side (Sorted High -> Low)
    repeated Level asks = 3; // Sell side (Sorted Low -> High)
    uint64 timestamp = 4;
}

enum AssetId {
    ASSET_UNKNOWN = 0;
    BTC = 1;
    ETH = 2;
    USDT = 3;
}

enum MarketId {
    MARKET_UNKNOWN = 0;
    BTC_USDT = 1; // Base: BTC (1), Quote: USDT (3)
    ETH_USDT = 2; // Base: ETH (2), Quote: USDT (3)
}

// Order status 
enum OrderStatus {
    PLACED = 0;
    PARTIALLY_FILLED = 1;
    FILLED = 2;
    REJECTED = 3;
    CANCELLED = 4;
}

message ExecutionReport {
    uint64 client_id = 1;
    uint64 user_id = 2;
    OrderStatus status = 3;
    repeated Trade trades = 4; // Zero if just PLACED, multiple if matched
    string remaining_quantity = 5;
    string error_message = 6; // Only populated if status == REJECTED
}

// Websocket updates types 
message Candle {
    string open = 2;
    string high = 3;
    string low = 4;
    string close = 5;
    string volume = 6;
    uint64 timestamp = 7; // Start time of the bucket
    
}

enum StreamType {
    TRADE = 0;
    CANDLE = 1;
    TICKER = 2;
    DEPTH = 3;
    USER_UPDATES = 4;
}

// WsOutMessage wrapper
message WsOutMessage {
    StreamType stream = 1; 
    oneof data {
        Trade trade = 2;
        Candle candle = 3;
        DepthUpdate depth = 4;
        ExecutionReport execution_report = 5;
    }
}