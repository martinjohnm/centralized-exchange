syntax = "proto3";
package exchange; // This determines the Rust module name


// Protobuf starts at 0

enum Side {
    BID = 0;
    ASK = 1;
}
enum OrderType {
    LIMIT = 0;
    MARKET = 1;
}
enum Action {
    CREATE = 0;
    CANCEL = 1;
    CANCEL_ALL = 2;
}

message OrderRequestProto {
    uint64 user_id = 1;
    string price = 2;      // Sent as "50000.50"
    string quantity = 3;   // Sent as "0.01"
    Side side = 4;
    string symbol = 5;     // "BTC_USDT"
    Action action = 6;
    OrderType order_type = 7;

    // use "Optional" Client ID Market maker cancel (A maping is present in the engine 
    // whcih is from clientId -> ENgineId in the engine mod to fast lookup for market makers

    optional uint64 client_id = 8;
    // Optional Engine ID for the Retail cancels
    optional uint64 engine_id = 9;
}

