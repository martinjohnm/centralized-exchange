server {
    listen 80;

    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        # This line tells Nginx: "If you can't find the file, send them to index.html"
        try_files $uri $uri/ /index.html;
    }

    # Optional: Cache static assets like JS and CSS for better performance
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}